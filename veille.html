<script>
  // Cette fonction transforme un texte en hash SHA-256
  async function sha256(message) {
      const msgBuffer = new TextEncoder().encode(message);
      const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
      const hashArray = Array.from(new Uint8Array(hashBuffer));
      const hashHex = hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
      return hashHex;
  }

  async function demanderMotDePasse() {
    // Le hash SHA-256 du mot de passe "1234" est :
    const hashCorrect = "03ac674216f3e15c761ee1a5e255f067953623c8b388b4459e13f978d7c846f4";
    
    const motDePasse = prompt("Entrez le mot de passe pour accéder au PDF :");
    
    if (motDePasse) {
        const hashSaisi = await sha256(motDePasse);
        
        if (hashSaisi === hashCorrect) {
             // Si le mot de passe est bon, on ouvre le lien
             // NOTE : Le lien est toujours visible dans le code source ici
             window.open("asset/pdf/Doc Windows.pdf", "_blank");
        } else {
             alert("Mot de passe incorrect.");
        }
    }
  }
